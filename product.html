<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج • دانتيل</title>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Cairo:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background:linear-gradient(135deg, #fff5f9, #fdf0f5); color:#4a2e38; padding:0 12px 20px; }
        .container { max-width:1200px; margin:0 auto; background:rgba(255,255,255,0.85); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); border-radius:40px; box-shadow:0 25px 60px rgba(220,150,170,0.15); padding:25px 20px 30px; }
        .top-promo { background:linear-gradient(135deg, #ffe8f0, #ffd9e5); color:#ad4b6e; padding:10px 20px; border-radius:30px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
        .top-promo a { color:#8d5a6b; text-decoration:none; }
        .header-main { display:flex; align-items:center; justify-content:space-between; padding:15px 10px; }
        .logo h1 { font-family:'El Messiri',serif; font-size:2.4rem; background:linear-gradient(to right, #c45173, #9c3b5a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .search-box { display:flex; border:1.5px solid #f4c0d3; border-radius:40px; overflow:hidden; background:rgba(255,255,255,0.9); margin-bottom:20px; }
        .search-box input { flex:1; padding:12px 20px; border:none; background:transparent; }
        .search-box button { background:transparent; border:none; padding:0 20px; color:#c45173; border-right:1px solid #f4c0d3; }
        .nav-menu { margin:15px 0; border-bottom:1px solid #ffcfde; padding-bottom:10px; overflow-x:auto; }
        .nav-menu ul { display:flex; list-style:none; gap:25px; }
        .nav-menu li a { text-decoration:none; color:#8d5a6b; font-weight:500; padding-bottom:8px; border-bottom:2px solid transparent; transition:0.2s; }
        .nav-menu li a:hover { border-bottom-color:#e87d9a; color:#9c3b5a; }
        .product-detail { display:flex; gap:40px; margin:30px 0; flex-wrap:wrap; }
        .product-images { flex:1; min-width:300px; }
        .main-image { width:100%; aspect-ratio:3/4; background-size:cover; background-position:center; border-radius:30px; border:1px solid #ffcfde; }
        .product-info-box { flex:1; min-width:300px; }
        .product-info-box h2 { font-family:'El Messiri',serif; font-size:2rem; color:#9c3b5a; margin-bottom:10px; }
        .rating { color:#e87d9a; margin-bottom:10px; }
        .price-large { font-size:2.2rem; font-weight:700; color:#9c3b5a; margin:20px 0; }
        .old-price-large { color:#b5838c; text-decoration:line-through; margin-right:15px; }
        .btn-add { background:#e87d9a; color:white; padding:16px; border-radius:40px; text-align:center; font-weight:700; width:100%; display:block; margin:20px 0; border:none; cursor:pointer; font-family:'Tajawal'; font-size:1.1rem; transition:0.3s; }
        .btn-add:hover { background:#c45173; }
        .btn-wa-large { background:#25d366; color:white; padding:16px; border-radius:40px; text-align:center; font-weight:700; width:100%; text-decoration:none; display:block; transition:0.3s; }
        .btn-wa-large:hover { background:#1da15b; }
        .description { margin:30px 0; line-height:1.8; }
        .description h3 { color:#9c3b5a; font-family:'El Messiri',serif; }
        .related { margin-top:50px; }
        .related h3 { font-family:'El Messiri',serif; color:#9c3b5a; margin-bottom:20px; }
        .related-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:20px; }
        .related-card { border:1px solid #ffcfde; border-radius:25px; overflow:hidden; transition:0.3s; }
        .related-card:hover { box-shadow:0 15px 30px rgba(200,120,150,0.15); transform:translateY(-3px); }
        .related-card img { width:100%; aspect-ratio:3/4; object-fit:cover; border-bottom:1px solid #ffcfde; }
        .related-card p { padding:12px; font-weight:500; color:#4a2e38; text-align:center; }
        .related-card .price { font-weight:700; color:#9c3b5a; }
        .footer { margin-top:40px; border-top:1px solid #ffcfde; padding-top:25px; display:flex; justify-content:space-between; color:#8d5a6b; }
        @media (max-width:768px) { .product-detail { flex-direction:column; } }
    </style>
</head>
<body>
<div class="container">
    <div class="top-promo">
        <span><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a> / <a href="shop.html">المتجر</a> / <span id="breadcrumbProduct">...</span></span>
        <a href="cart.html" style="position:relative;">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count" style="position:absolute; top:-8px; left:-10px; background:#e87d9a; color:white; font-size:0.7rem; width:18px; height:18px; border-radius:50%; display:none; align-items:center; justify-content:center;">0</span>
        </a>
    </div>
    <div class="header-main">
        <div class="logo"><h1>دانتيل</h1></div>
        <form class="search-box" action="shop.html" method="get">
            <input type="text" name="search" placeholder="ابحثي عن منتج...">
            <button type="submit"><i class="fas fa-search"></i></button>
        </form>
    </div>
    <div class="nav-menu">
        <ul>
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="shop.html">المتجر</a></li>
            <li><a href="#" id="navCategory">...</a></li>
        </ul>
    </div>

    <div class="product-detail">
        <div class="product-images">
            <div class="main-image" id="mainImage" style="background-image:url('https://placehold.co/600x800/eee/999?text=منتج')"></div>
        </div>
        <div class="product-info-box">
            <h2 id="productName">...</h2>
            <div class="rating" id="productRating">★★★★☆ (0 تقييم)</div>
            <div class="price-large">
                <span id="currentPrice">0 شيكل</span>
                <span class="old-price-large" id="oldPrice"></span>
            </div>
            <p style="color:#e87d9a; font-weight:500;" id="discountText"></p>
            <p><strong>الفئة:</strong> <span id="productCategory">...</span></p>
            <button class="btn-add" id="addToCartBtn"><i class="fas fa-cart-plus"></i> أضف للعربة</button>
            <a href="#" class="btn-wa-large" id="btnWa" target="_blank"><i class="fab fa-whatsapp"></i> اطلب الآن عبر واتساب</a>
            <div class="description">
                <h3>وصف المنتج</h3>
                <p id="productDescription">...</p>
            </div>
        </div>
    </div>

    <div class="related">
        <h3>قد يعجبكِ أيضاً</h3>
        <div class="related-grid" id="relatedProducts"></div>
    </div>

    <div class="footer"><div>© ٢٠٢٥ دانتيل</div><div><a href="privacy.html" style="color:#8d5a6b;">الخصوصية</a> | <a href="faq.html" style="color:#8d5a6b;">مساعدة</a></div></div>
</div>

<script src="products.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const productId = Number(params.get('id'));

    async function loadAndDisplay() {
        const products = await loadProducts();
        const product = products.find(p => p.id === productId);
        if (!product) {
            document.body.innerHTML = '<div style="text-align:center; padding:50px;"><h1 style="color:#9c3b5a;">المنتج غير موجود</h1><a href="index.html" style="color:#e87d9a;">العودة للرئيسية</a></div>';
            return;
        }
        const mainImg = getImageUrl(product.image);
        document.getElementById('mainImage').style.backgroundImage = `url('${mainImg}')`;
        document.getElementById('productName').textContent = product.name;
        document.getElementById('productCategory').textContent = product.category || 'عام';
        document.getElementById('navCategory').textContent = product.category || 'عام';
        document.getElementById('breadcrumbProduct').textContent = product.name;
        document.title = product.name + ' • دانتيل';

        document.getElementById('currentPrice').textContent = product.price + ' شيكل';
        if (product.oldPrice) document.getElementById('oldPrice').textContent = product.oldPrice + ' شيكل';
        else document.getElementById('oldPrice').style.display = 'none';
        if (product.discount) document.getElementById('discountText').textContent = '🎯 ' + product.discount;
        else document.getElementById('discountText').style.display = 'none';

        const stars = '★'.repeat(Math.floor(product.rating || 0)) + '☆'.repeat(5 - Math.floor(product.rating || 0));
        document.getElementById('productRating').innerHTML = `${stars} (${product.reviews || 0} تقييم)`;

        const waMsg = encodeURIComponent(`مرحباً، أريد شراء: ${product.name}`);
        document.getElementById('btnWa').href = `https://wa.me/${product.whatsapp}?text=${waMsg}`;
        document.getElementById('addToCartBtn').onclick = function() { addToCart(product.id); };
        document.getElementById('productDescription').textContent = product.description || `${product.name} - قطعة عالية الجودة من دانتيل، ناعمة ومريحة.`;

        const related = products.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
        const relatedGrid = document.getElementById('relatedProducts');
        relatedGrid.innerHTML = related.length > 0 ? related.map(p => `
            <a href="product.html?id=${p.id}" style="text-decoration:none; color:inherit;">
                <div class="related-card"><img src="${getImageUrl(p.image)}" alt="${p.name}"><p>${p.name}</p><p class="price">${p.price} شيكل</p></div>
            </a>`).join('') : '<p style="color:#b5836d;">لا توجد منتجات مشابهة حالياً.</p>';
    }

    document.addEventListener('DOMContentLoaded', loadAndDisplay);
    updateCartCount();
</script>
</body>
</html>
